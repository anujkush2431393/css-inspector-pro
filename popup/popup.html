<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Inspector Pro</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <h1>CSS Inspector Pro</h1>
            </div>
        </header>

        <main>
            <!-- Inspect Toggle -->
            <section class="action-section">
                <button id="toggle-inspect-btn" class="btn-primary glass-panel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>Start Inspecting</span>
                </button>
                <div id="status-indicator" class="status idle">
                    <span class="dot"></span>
                    <span class="status-text">Ready</span>
                </div>
            </section>

            <!-- Results Panel (Hidden by default) -->
            <section id="results-panel" class="results-container hidden glass-panel">
                <!-- Search -->
                <div class="search-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-css" placeholder="Search CSS properties...">
                </div>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="tab-css">CSS</button>
                    <button class="tab-btn" data-tab="tab-tailwind">Tailwind</button>
                    <button class="tab-btn" data-tab="tab-a11y">A11y</button>
                    <button class="tab-btn" data-tab="tab-dom">DOM</button>
                </div>

                <!-- Tab Contents -->
                <div class="tab-content-container">
                    
                    <!-- CSS Tab -->
                    <div id="tab-css" class="tab-content active">
                        <div id="css-properties-list" class="properties-list">
                            <!-- Populated dynamically -->
                        </div>
                        <div class="action-row">
                            <button id="copy-css-btn" class="btn-secondary">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy CSS
                            </button>
                        </div>
                    </div>

                    <!-- Tailwind Tab -->
                    <div id="tab-tailwind" class="tab-content hidden">
                        <div id="tailwind-output" class="code-block">
                            <!-- Populated dynamically -->
                        </div>
                        <div class="action-row">
                            <button id="copy-tailwind-btn" class="btn-secondary">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy Tailwind
                            </button>
                        </div>
                    </div>

                    <!-- Accessibility Tab -->
                    <div id="tab-a11y" class="tab-content hidden">
                        <div class="a11y-score-card">
                            <div class="score-circle">
                                <span id="a11y-score-value">--</span>
                            </div>
                            <span class="score-label">Accessibility Score</span>
                        </div>
                        <ul id="a11y-issues-list" class="issues-list">
                            <!-- Populated dynamically -->
                        </ul>
                    </div>

                    <!-- DOM Tab -->
                    <div id="tab-dom" class="tab-content hidden">
                        <div class="dom-info-grid" id="dom-info-grid">
                            <!-- Populated dynamically -->
                        </div>
                    </div>

                </div>
            </section>
        </main>

        <!-- Footer / Export Options -->
        <footer class="glass-footer">
            <button id="clear-data-btn" class="btn-icon" style="color: var(--error); border-color: rgba(239, 68, 68, 0.3);" title="Clear Data">Clear</button>
            <div style="display:flex; align-items:center; margin-left:auto; gap: 8px;">
                <span class="footer-label">Export:</span>
                <div class="export-buttons">
                    <button id="export-json" class="btn-icon" title="Export as JSON">JSON</button>
                    <button id="export-txt" class="btn-icon" title="Export as TXT">TXT</button>
                    <button id="export-md" class="btn-icon" title="Export as Markdown">MD</button>
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
